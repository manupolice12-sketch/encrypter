name: Build and Release Cross-Platform

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0, v1.1.0, etc.
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # LINUX BUILD
      - name: Build Linux Binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --windowed --name "Encrypter-Linux" \
          --add-data "src/image/icon.png:image" \
          --add-data "src/encrypter.py:." \
          src/gui-encryption.py

      # MACOS BUILD
      - name: Build macOS App
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --windowed --name "Encrypter-MacOS" \
          --add-data "src/image/icon.png:image" \
          --add-data "src/encrypter.py:." \
          src/gui-encryption.py
          # Zip the .app folder so it can be uploaded
          cd dist && zip -r Encrypter-MacOS.zip Encrypter-MacOS.app

      # RELEASE
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Encrypter-Linux
            dist/Encrypter-MacOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}