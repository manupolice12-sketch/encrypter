name: Build and Release Cross-Platform

on:
  push:
    tags:
      - 'v*' # Only triggers on version tags like v1.1.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libtk8.6

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Binary
        run: |
          # We use specific names to avoid confusion in the release assets
          python -m PyInstaller --onefile --windowed \
          --name "Encrypter-${{ matrix.os }}" \
          --add-data "src/image/icon.png:image" \
          --add-data "src/encrypter.py:." \
          src/gui-encryption.py

      - name: Post-Build macOS (Zip App)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          # macOS .app is a folder, must be zipped for Release
          zip -r Encrypter-MacOS.zip Encrypter-macos-latest.app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Encrypter-ubuntu-latest
            dist/Encrypter-MacOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
